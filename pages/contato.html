<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Felipe Ribeiro</title>
    <link rel="stylesheet" href="/styles/contato.css">
    <script src="/scripts/contact.js"></script>
</head>
<body>
    <header class="topnav">
        <a href="../index.html">Home</a>
        <a href="../pages/curriculo.html">Currículo</a>
        <a href="../pages/servicos.html">Serviços</a>
        <a class="active" href="">Contato</a>
        <a href="https://github.com/felipe2102" rel="external">Github</a>
    </header> 
    <div class="content">
        <h1>Contato</h1>
        <form action="#">
            <div>
                <label for="nome">Insira seu nome:</label>
                <input type="text" name="Nome" id="nome">
            </div>
            <div>
                <label for="numero">Insira seu número de telefone:</label>
                <input type="tel" name="Numero" id="numero">
            </div>
            <div>
                <label for="email">Insira seu Email:</label>
                <input type="email" name="Email" id="email">
            </div>
            <div>
                <p>É Pessoa Física ou Jurídica?</p>
                <input type="radio" name="pf" id="radio-pf">
                <label for="radio-pf">Pessoa Física</label>
                <input type="radio" name="pj" id="radio-pj">
                <label for="radio-pj">Pessoa Jurídica</label>
            </div>
            <div>
                <p>Melhor horário de contato:</p>
                <input type="time" name="horario" id="input-horario">
            </div>
            <div>
                <p>Tipo de serviço:</p>
                <select name="servico" id="select-servico">
                    <option value="lp-small">Site Estático com 1 a 2 páginas</option>
                    <option value="lp-medium">Site Estático com 3 a 5 páginas</option>
                    <option value="lp-big">Site Estático com mais de 5 páginas</option>
                    <option value="dp">Site Dinâmico</option>
                </select>
            </div>
            <div>
                <p>Insira uma descrição detalhada do serviço:</p>
                <textarea name="descrição" id="desc" cols="30" rows="10"></textarea>
            </div>
            <div>
                <input type="submit" value="Enviar">
            </div>
        </form>
    </div>
</label>
</div>
</html>
